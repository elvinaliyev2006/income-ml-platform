version: '3.9'

services:

  database:
    image: mysql:latest
    container_name: income_db
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql


  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: income-app
    container_name: income_fastapi
    restart: always
    command: >
      uvicorn fastapi_app.fastapi_app:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=database
    depends_on:
      - database
    volumes:
      - .:/app


volumes:
  mysql_data: